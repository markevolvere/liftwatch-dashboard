<!DOCTYPE html>
<html lang="en">
<head><script>if(!localStorage.getItem("lw_auth")){window.location.href="login.html?next="+encodeURIComponent(location.pathname+location.search);};</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies — LiftWatch</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>LiftWatch</h1>
      <div class="header-meta">
        <span id="meta-updated">Updated: —</span> • <span id="meta-total">— jobs</span>
      </div>
    </div>
  </header>

  <!-- TAB NAVIGATION -->
  <nav class="tab-nav">
    <div class="tab-nav-item"><a href="index.html" class="nav-link">Overview</a></div>
    <div class="tab-nav-item"><a href="jobs.html" class="nav-link">Jobs</a></div>
    <div class="tab-nav-item"><a href="companies.html" class="nav-link">Companies</a></div>
    <div class="tab-nav-item"><a href="analytics.html" class="nav-link">Analytics</a></div>
    <div class="tab-nav-item"><a href="downloads.html" class="nav-link">Downloads</a></div>
    <div class="tab-nav-item"><a href="methodology.html" class="nav-link">Methodology</a></div>
  </nav>

  <main>
    <div class="container">
      <section>
        <h2>Company Directory</h2>
        
        <!-- SEARCH BAR -->
        <div class="search-bar">
          <input type="search" id="search-input" placeholder="Search company name..." autocomplete="off">
        </div>

        <!-- SORT -->
        <div style="margin-bottom: var(--spacing-lg); text-align: right;">
          <label style="font-size: 13px; color: var(--color-gray); margin-right: var(--spacing-sm);">Sort by:</label>
          <select id="sort-select" style="width: auto;">
            <option value="jobs-desc">Most Jobs</option>
            <option value="jobs-asc">Fewest Jobs</option>
            <option value="name-asc">Name A-Z</option>
          </select>
        </div>

        <!-- COMPANIES GRID -->
        <div id="companies-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--spacing-lg);"></div>
      </section>
    </div>
  </main>

  <footer>
    <p><strong>LiftWatch Intelligence Portal</strong> — Australian residential lift industry competitive analysis. Data updated daily.</p>
  </footer>

  <script>
    let allCompanies = [];
    let filteredCompanies = [];

    async function initCompanies() {
      const data = await loadData();
      const jobs = data.jobs;
      const meta = data.meta;

      // Update header meta
      document.getElementById('meta-updated').textContent = `Updated: ${meta.updated}`;
      document.getElementById('meta-total').textContent = `${meta.total} jobs`;

      // Build company list with stats
      const companyMap = {};
      jobs.forEach(job => {
        if (!companyMap[job.company]) {
          companyMap[job.company] = {
            name: job.company,
            count: 0,
            categories: {},
            states: {}
          };
        }
        companyMap[job.company].count++;
        
        if (job.category) {
          companyMap[job.company].categories[job.category] = (companyMap[job.company].categories[job.category] || 0) + 1;
        }
        if (job.state) {
          companyMap[job.company].states[job.state] = (companyMap[job.company].states[job.state] || 0) + 1;
        }
      });

      allCompanies = Object.values(companyMap);
      filteredCompanies = allCompanies;

      // Event listeners
      const applyFilters = () => {
        const query = document.getElementById('search-input').value.toLowerCase();
        let results = allCompanies.filter(company => 
          company.name.toLowerCase().includes(query)
        );

        // Sort
        const sortBy = document.getElementById('sort-select').value;
        switch(sortBy) {
          case 'jobs-asc':
            results.sort((a, b) => a.count - b.count);
            break;
          case 'name-asc':
            results.sort((a, b) => a.name.localeCompare(b.name));
            break;
          default: // jobs-desc
            results.sort((a, b) => b.count - a.count);
        }

        filteredCompanies = results;
        renderCompanies();
      };

      document.getElementById('search-input').addEventListener('input', applyFilters);
      document.getElementById('sort-select').addEventListener('change', applyFilters);

      // Initial render
      renderCompanies();
      setActiveNav('companies');
    }

    function renderCompanies() {
      const grid = document.getElementById('companies-grid');
      grid.innerHTML = filteredCompanies.map(company => {
        const topCategory = Object.entries(company.categories).sort((a, b) => b[1] - a[1])[0];
        const topState = Object.entries(company.states).sort((a, b) => b[1] - a[1])[0];

        return `
          <div onclick="sessionStorage.setItem('filterCompany', company.name); window.location.href='jobs.html';" class="company-card" style="cursor:pointer;">
            <div class="company-card-name">${escapeHtml(company.name)}</div>
            <div class="company-card-stat"><strong>${company.count}</strong> job${company.count !== 1 ? 's' : ''}</div>
            ${topCategory ? `<div class="company-card-stat">Top role: <strong>${topCategory[0]}</strong></div>` : ''}
            ${topState ? `<div class="company-card-stat">Top state: <strong>${topState[0]}</strong></div>` : ''}
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    initCompanies().catch(err => console.error('Error loading companies:', err));
  </script>
</body>
</html>
