<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftWatch — Australian Elevator Industry Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --text: #e2e8f0;
    --muted: #8892a4;
    --danger: #ff6584;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header { padding: 24px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .badge { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: 0.5px; }
  .updated { color: var(--muted); font-size: 0.8rem; }

  .container { max-width: 1400px; margin: 0 auto; padding: 32px; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .stat-card .label { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent2); }
  .stat-card .sub { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 24px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
  .card h2 { font-size: 0.9rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 20px; }

  canvas { max-height: 280px; }

  .bar-list { display: flex; flex-direction: column; gap: 10px; }
  .bar-item { display: flex; align-items: center; gap: 12px; }
  .bar-item .name { font-size: 0.82rem; color: var(--text); min-width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-item .bar-track { flex: 1; background: var(--border); border-radius: 4px; height: 8px; }
  .bar-item .bar-fill { background: var(--accent); border-radius: 4px; height: 8px; transition: width 0.8s ease; }
  .bar-item .count { font-size: 0.8rem; color: var(--muted); min-width: 30px; text-align: right; }

  .jobs-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .jobs-table th { text-align: left; color: var(--muted); font-size: 0.73rem; text-transform: uppercase; letter-spacing: 0.6px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
  .jobs-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .jobs-table tr:last-child td { border-bottom: none; }
  .jobs-table tr:hover td { background: rgba(108,99,255,0.05); }
  .jobs-table a { color: var(--accent); text-decoration: none; }
  .jobs-table a:hover { text-decoration: underline; }
  .tag { display: inline-block; background: rgba(108,99,255,0.15); color: var(--accent); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; }
  .tag.state { background: rgba(0,212,170,0.12); color: var(--accent2); }

  .full-width { grid-column: 1 / -1; }

  @media (max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .container { padding: 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Lift<span>Watch</span> 🏗️</h1>
    <div class="updated" id="updated-label">Loading...</div>
  </div>
  <span class="badge">LIVE INTEL</span>
</header>

<div class="container">

  <!-- Stats Row -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">Total Jobs Tracked</div>
      <div class="value" id="stat-total">—</div>
      <div class="sub">All time</div>
    </div>
    <div class="stat-card">
      <div class="label">Companies Hiring</div>
      <div class="value" id="stat-companies">—</div>
      <div class="sub">Unique employers</div>
    </div>
    <div class="stat-card">
      <div class="label">States Active</div>
      <div class="value" id="stat-states">—</div>
      <div class="sub">Across Australia</div>
    </div>
    <div class="stat-card">
      <div class="label">Top Role</div>
      <div class="value" style="font-size:1.1rem;padding-top:6px" id="stat-top-role">—</div>
      <div class="sub">Most in-demand</div>
    </div>
  </div>

  <!-- Timeline + State Breakdown -->
  <div class="grid-2">
    <div class="card">
      <h2>Jobs Over Time</h2>
      <canvas id="timelineChart"></canvas>
    </div>
    <div class="card">
      <h2>Jobs by State</h2>
      <canvas id="stateChart"></canvas>
    </div>
  </div>

  <!-- Companies + Roles + Sources -->
  <div class="grid-3">
    <div class="card">
      <h2>Top Companies Hiring</h2>
      <div class="bar-list" id="companies-list"></div>
    </div>
    <div class="card">
      <h2>Role Types</h2>
      <canvas id="roleChart"></canvas>
    </div>
    <div class="card">
      <h2>Job Sources</h2>
      <canvas id="sourceChart"></canvas>
    </div>
  </div>

  <!-- Recent Jobs -->
  <div class="card">
    <h2>Recent Job Listings</h2>
    <table class="jobs-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Title</th>
          <th>Company</th>
          <th>State</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody id="jobs-tbody"></tbody>
    </table>
  </div>

</div>

<script>
const COLORS = ['#6c63ff','#00d4aa','#ff6584','#ffd166','#06d6a0','#118ab2','#ef476f','#ffc8dd','#a8dadc','#457b9d'];

async function loadData() {
  const res = await fetch('data.json?' + Date.now());
  return res.json();
}

function makeBarList(items, maxVal, containerId) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.slice(0, 15).forEach(([name, count]) => {
    const pct = Math.round((count / maxVal) * 100);
    el.innerHTML += `
      <div class="bar-item">
        <span class="name" title="${name}">${name || 'Unknown'}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <span class="count">${count}</span>
      </div>`;
  });
}

function makeChart(id, type, labels, data, colors) {
  const ctx = document.getElementById(id).getContext('2d');
  return new Chart(ctx, {
    type,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors || COLORS,
        borderColor: type === 'line' ? '#6c63ff' : colors || COLORS,
        borderWidth: type === 'line' ? 2 : 0,
        fill: type === 'line',
        tension: 0.4,
        pointBackgroundColor: '#6c63ff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: type !== 'bar' && type !== 'line', labels: { color: '#8892a4', font: { size: 11 } } }
      },
      scales: type === 'bar' || type === 'line' ? {
        x: { ticks: { color: '#8892a4', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
        y: { ticks: { color: '#8892a4' }, grid: { color: '#2a2d3a' } }
      } : {}
    }
  });
}

async function init() {
  const d = await loadData();

  document.getElementById('updated-label').textContent = 'Last updated: ' + d.updated;
  document.getElementById('stat-total').textContent = d.total.toLocaleString();
  document.getElementById('stat-companies').textContent = d.companies.length;
  document.getElementById('stat-states').textContent = d.states.filter(s => s[0]).length;
  document.getElementById('stat-top-role').textContent = d.roles[0]?.[0] || '—';

  // Timeline
  makeChart('timelineChart', 'line',
    d.timeline.map(r => r[0]),
    d.timeline.map(r => r[1]),
    COLORS[0]
  );

  // State
  makeChart('stateChart', 'doughnut',
    d.states.filter(s => s[0]).map(s => s[0]),
    d.states.filter(s => s[0]).map(s => s[1]),
    COLORS
  );

  // Companies bar list
  const maxCo = d.companies[0]?.[1] || 1;
  makeBarList(d.companies, maxCo, 'companies-list');

  // Roles
  makeChart('roleChart', 'doughnut',
    d.roles.map(r => r[0] || 'other'),
    d.roles.map(r => r[1]),
    COLORS
  );

  // Sources
  makeChart('sourceChart', 'doughnut',
    d.sources.map(s => s[0]),
    d.sources.map(s => s[1]),
    COLORS
  );

  // Recent jobs table
  const tbody = document.getElementById('jobs-tbody');
  d.recent.forEach(j => {
    const title = j.url
      ? `<a href="${j.url}" target="_blank">${j.title || 'View Job'}</a>`
      : (j.title || '—');
    tbody.innerHTML += `
      <tr>
        <td>${j.date || '—'}</td>
        <td>${title}</td>
        <td>${j.company || '—'}</td>
        <td><span class="tag state">${j.state || '—'}</span></td>
        <td><span class="tag">${j.source || '—'}</span></td>
      </tr>`;
  });
}

init().catch(console.error);
</script>
</body>
</html>
