<!DOCTYPE html>
<html lang="en">
<head><script>if(!localStorage.getItem("lw_auth")){window.location.href="login.html?next="+encodeURIComponent(location.pathname+location.search);};</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Directory — LiftWatch</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/app.js"></script>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>LiftWatch</h1>
      <div class="header-meta">
        <span id="meta-updated">Updated: —</span> • <span id="meta-total">— jobs</span>
      </div>
    </div>
  </header>

  <!-- TAB NAVIGATION -->
  <nav class="tab-nav">
    <div class="tab-nav-item"><a href="index.html" class="nav-link">Overview</a></div>
    <div class="tab-nav-item"><a href="jobs.html" class="nav-link">Jobs</a></div>
    <div class="tab-nav-item"><a href="companies.html" class="nav-link">Companies</a></div>
    <div class="tab-nav-item"><a href="analytics.html" class="nav-link">Analytics</a></div>
    <div class="tab-nav-item"><a href="downloads.html" class="nav-link">Downloads</a></div>
    <div class="tab-nav-item"><a href="methodology.html" class="nav-link">Methodology</a></div>
  </nav>

  <main>
    <div class="container">
      <section>
        <h2>Job Directory</h2>
        
        <!-- SEARCH BAR — ALWAYS VISIBLE -->
        <div class="search-bar">
          <input type="search" id="search-input" placeholder="Search title, company, location..." autocomplete="off">
        </div>

        <!-- FILTER TOGGLE BUTTON (MOBILE) -->
        <div style="margin-bottom: var(--spacing-md); display: flex; gap: var(--spacing-sm);">
          <button id="filter-toggle-btn" class="btn-secondary" style="flex: 1; justify-content: center;">
            Filters ▾
          </button>
          <button id="clear-all-btn" class="btn-secondary" style="flex: 1; justify-content: center;">
            Clear All
          </button>
        </div>

        <!-- FILTER DRAWER (MOBILE) -->
        <div class="filter-drawer" id="filter-drawer">
          <button class="filter-drawer-close" id="filter-drawer-close">✕</button>
          <h3>Filter By</h3>
          <select id="filter-company" data-placeholder="Company"></select>
          <select id="filter-category" data-placeholder="Category"></select>
          <select id="filter-state" data-placeholder="State"></select>
          <select id="filter-source" data-placeholder="Source"></select>
          <select id="filter-status" data-placeholder="Status"></select>
        </div>
        <div class="filter-drawer-backdrop" id="filter-drawer-backdrop"></div>

        <!-- ACTIVE FILTERS (CHIPS) -->
        <div class="filter-chips" id="filter-chips"></div>

        <!-- RESULTS HEADER -->
        <div class="results-header">
          <div class="results-header-left">
            <strong id="results-count">0</strong> jobs found
          </div>
          <div class="results-header-right">
            <select id="sort-select" style="width: auto;">
              <option value="date-desc">Newest First</option>
              <option value="date-asc">Oldest First</option>
              <option value="company-asc">Company A-Z</option>
              <option value="title-asc">Title A-Z</option>
            </select>
          </div>
        </div>

        <!-- JOBS LIST (EXPANDABLE CARDS) -->
        <div id="jobs-list"></div>

        <!-- PAGINATION -->
        <div class="pagination" id="pagination"></div>
      </section>
    </div>
  </main>

  <footer>
    <p><strong>LiftWatch Intelligence Portal</strong> — Australian residential lift industry competitive analysis. Data updated daily.</p>
  </footer>

  <script>
    let currentPage = 1;
    const perPage = 20;
    let filteredJobs = [];
    let allJobs = [];
    let activeFilters = {};

    async function initJobs() {
      const data = await loadData();
      allJobs = data.jobs;
      const meta = data.meta;

      // Update header meta
      document.getElementById('meta-updated').textContent = `Updated: ${meta.updated}`;
      document.getElementById('meta-total').textContent = `${meta.total} jobs`;

      // Build filter dropdowns
      buildSelect(document.getElementById('filter-company'), getUnique(allJobs, 'company'));
      buildSelect(document.getElementById('filter-category'), getUnique(allJobs, 'category'));
      buildSelect(document.getElementById('filter-state'), getUnique(allJobs, 'state'));
      buildSelect(document.getElementById('filter-source'), getUnique(allJobs, 'source'));
      buildSelect(document.getElementById('filter-status'), getUnique(allJobs, 'status'));

      // Apply URL query params (e.g. ?company=Schindler from clicking company name)
      const urlParams = new URLSearchParams(window.location.search);
      const urlCompany = urlParams.get('company');
      if (urlCompany) {
        document.getElementById('filter-company').value = urlCompany;
        activeFilters.company = urlCompany;
      }

      // Event listeners
      const applyFilters = () => {
        currentPage = 1;
        activeFilters = {
          company: document.getElementById('filter-company').value,
          category: document.getElementById('filter-category').value,
          state: document.getElementById('filter-state').value,
          source: document.getElementById('filter-source').value,
          status: document.getElementById('filter-status').value
        };

        const query = document.getElementById('search-input').value;
        let results = searchJobs(allJobs, query);
        results = filterJobs(results, activeFilters);

        // Sort
        const sortBy = document.getElementById('sort-select').value;
        switch(sortBy) {
          case 'date-asc':
            results.sort((a, b) => new Date(a.date_posted) - new Date(b.date_posted));
            break;
          case 'company-asc':
            results.sort((a, b) => a.company.localeCompare(b.company));
            break;
          case 'title-asc':
            results.sort((a, b) => a.title.localeCompare(b.title));
            break;
          default: // date-desc
            results.sort((a, b) => new Date(b.date_posted) - new Date(a.date_posted));
        }

        filteredJobs = results;
        renderJobs();
        updateFilterChips();
      };

      document.getElementById('search-input').addEventListener('input', applyFilters);
      document.getElementById('filter-company').addEventListener('change', applyFilters);
      document.getElementById('filter-category').addEventListener('change', applyFilters);
      document.getElementById('filter-state').addEventListener('change', applyFilters);
      document.getElementById('filter-source').addEventListener('change', applyFilters);
      document.getElementById('filter-status').addEventListener('change', applyFilters);
      document.getElementById('sort-select').addEventListener('change', applyFilters);

      // Filter drawer toggle
      const filterDrawer = document.getElementById('filter-drawer');
      const filterToggleBtn = document.getElementById('filter-toggle-btn');
      const filterDrawerClose = document.getElementById('filter-drawer-close');
      const filterDrawerBackdrop = document.getElementById('filter-drawer-backdrop');

      filterToggleBtn.addEventListener('click', () => {
        filterDrawer.classList.toggle('open');
      });

      filterDrawerClose.addEventListener('click', () => {
        filterDrawer.classList.remove('open');
      });

      filterDrawerBackdrop.addEventListener('click', () => {
        filterDrawer.classList.remove('open');
      });

      // Clear all filters
      document.getElementById('clear-all-btn').addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        document.getElementById('filter-company').value = '';
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-state').value = '';
        document.getElementById('filter-source').value = '';
        document.getElementById('filter-status').value = '';
        document.getElementById('sort-select').value = 'date-desc';
        applyFilters();
        filterDrawer.classList.remove('open');
      });

      // Initial render
      filteredJobs = allJobs;
      renderJobs();
      setActiveNav('jobs');
    }

    function renderJobs() {
      document.getElementById('results-count').textContent = filteredJobs.length;
      
      const paged = paginate(filteredJobs, currentPage, perPage);
      const jobsList = document.getElementById('jobs-list');
      
      jobsList.innerHTML = paged.items.map((job, idx) => {
        // Parse employment type from description if it exists (e.g., "Full-time", "Part-time", "Contract")
        const employmentType = job.description && /^(Full-time|Part-time|Contract|Casual)/i.test(job.description) 
          ? job.description.split(/\n/)[0] 
          : '';
        
        // PDF button link (prefer drive_download_url, fallback to drive folder)
        const pdfUrl = job.drive_download_url || 'https://drive.google.com/drive/folders/1nzSRGxa4yqwxfgr6sGmjd6ay6EcdUGIW';
        
        return `
          <div class="job-card" data-job-id="${idx}">
            <div class="job-card-header">
              <div class="job-card-summary">
                <div class="job-card-title">${escapeHtml(job.title)}</div>
                <div class="job-card-meta-top">
                  <a href="jobs.html?company=${encodeURIComponent(job.company)}" class="job-card-company">${escapeHtml(job.company)}</a>
                  <span class="job-card-meta-item"><span class="badge">${job.category || '—'}</span></span>
                  <span class="job-card-meta-item text-gray">${formatDate(job.date_posted)}</span>
                </div>
                <div class="job-card-meta-secondary">
                  <span>${job.location || '—'}</span>
                  ${employmentType ? `<span>${employmentType}</span>` : ''}
                  ${job.salary_raw ? `<span>${escapeHtml(job.salary_raw)}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="job-card-actions">
              <a href="${pdfUrl}" target="_blank" rel="noopener" class="btn-pdf-download" title="Download PDF">⬇ PDF</a>
              <button class="job-card-expand-btn" title="More Details">+ More</button>
            </div>
            <div class="job-card-content">
              ${job.description && !employmentType ? `<div class="job-detail-section"><div class="job-detail-section-title">Summary</div><div class="job-detail-section-value">${escapeHtml(job.description).substring(0, 500)}${job.description.length > 500 ? '...' : ''}</div></div>` : '<div class="job-detail-section"><div class="job-detail-section-title">Summary</div><div class="job-detail-section-value">Summary available soon — AI processing in progress</div></div>'}
              ${job.state ? `<div class="job-detail-section"><div class="job-detail-section-title">State</div><div class="job-detail-section-value">${escapeHtml(job.state)}</div></div>` : ''}
              ${job.location ? `<div class="job-detail-section"><div class="job-detail-section-title">Full Location</div><div class="job-detail-section-value">${escapeHtml(job.location)}</div></div>` : ''}
              ${job.salary_raw ? `<div class="job-detail-section"><div class="job-detail-section-title">Pay/Salary</div><div class="job-detail-section-value">${escapeHtml(job.salary_raw)}</div></div>` : ''}
              <div class="job-detail-section"><div class="job-detail-section-title">Posted Date</div><div class="job-detail-section-value">${formatDate(job.date_posted)}</div></div>
              ${job.url ? `<div class="job-detail-section"><div class="job-detail-section-title">Source</div><div class="job-detail-section-value"><a href="${escapeHtml(job.url)}" target="_blank" rel="noopener" class="source-link">${escapeHtml(job.source || 'View Original')}</a></div></div>` : ''}
              ${job.status ? `<div class="job-detail-section"><div class="job-detail-section-title">Status</div><div class="job-detail-section-value"><span class="badge badge-${job.status.toLowerCase()}">${job.status}</span></div></div>` : ''}
              <div class="job-detail-buttons">
                <a href="${pdfUrl}" target="_blank" rel="noopener" class="btn btn-pdf">⬇ PDF</a>
                ${job.url ? `<a href="${escapeHtml(job.url)}" target="_blank" rel="noopener" class="btn btn-secondary">🔗 View Source</a>` : ''}
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Attach click handlers for expand/collapse
      document.querySelectorAll('.job-card-expand-btn, .job-card-header').forEach(el => {
        el.addEventListener('click', (e) => {
          if (e.target.closest('.job-card-company') || e.target.closest('.btn-pdf-download')) {
            return; // Don't expand if clicking company link or PDF button
          }
          el.closest('.job-card').classList.toggle('expanded');
        });
      });

      // Pagination
      const paginationEl = document.getElementById('pagination');
      paginationEl.innerHTML = '';
      
      if (paged.pages > 1) {
        const prevBtn = document.createElement('button');
        prevBtn.textContent = '← Previous';
        prevBtn.disabled = paged.page === 1;
        prevBtn.onclick = () => { currentPage--; renderJobs(); window.scrollTo(0, 0); };
        paginationEl.appendChild(prevBtn);

        const pageInfo = document.createElement('span');
        pageInfo.style.padding = '0 var(--spacing-md)';
        pageInfo.textContent = `Page ${paged.page} of ${paged.pages}`;
        paginationEl.appendChild(pageInfo);

        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next →';
        nextBtn.disabled = paged.page === paged.pages;
        nextBtn.onclick = () => { currentPage++; renderJobs(); window.scrollTo(0, 0); };
        paginationEl.appendChild(nextBtn);
      }
    }

    function updateFilterChips() {
      const chipsContainer = document.getElementById('filter-chips');
      const chips = [];

      if (activeFilters.company) chips.push({ label: activeFilters.company, key: 'company' });
      if (activeFilters.category) chips.push({ label: activeFilters.category, key: 'category' });
      if (activeFilters.state) chips.push({ label: activeFilters.state, key: 'state' });
      if (activeFilters.source) chips.push({ label: activeFilters.source, key: 'source' });
      if (activeFilters.status) chips.push({ label: activeFilters.status, key: 'status' });

      chipsContainer.innerHTML = chips.map(chip => `
        <div class="filter-chip">
          ${chip.label}
          <span class="filter-chip-remove" data-key="${chip.key}">✕</span>
        </div>
      `).join('');

      document.querySelectorAll('.filter-chip-remove').forEach(el => {
        el.addEventListener('click', () => {
          const key = el.getAttribute('data-key');
          document.getElementById('filter-' + key).value = '';
          currentPage = 1;
          const applyFiltersEvent = new Event('change');
          document.getElementById('filter-' + key).dispatchEvent(applyFiltersEvent);
        });
      });
    }

    function escapeHtml(text) {
      if (!text) return '';
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    initJobs().catch(err => console.error('Error loading jobs:', err));
  </script>
</body>
</html>
