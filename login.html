<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftWatch — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1a2f4a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border: none;
    border-radius: 8px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
  }
  .logo { font-size: 28px; font-weight: 700; color: #0f172a; margin-bottom: 4px; }
  .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 32px; }
  label { display: block; text-align: left; font-size: 11px; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .password-field {
    position: relative;
    margin-bottom: 16px;
  }
  input[type="password"],
  input[type="text"] {
    width: 100%;
    padding: 12px 40px 12px 16px;
    border: 1px solid #e2e5ea;
    border-radius: 4px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus,
  input[type="text"]:focus {
    border-color: #2d4a8a;
    box-shadow: 0 0 0 3px rgba(45, 74, 138, 0.1);
  }
  .password-toggle {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #6b7280;
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    min-height: auto;
    width: auto;
    height: auto;
  }
  .password-toggle:hover {
    color: #2d4a8a;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #2d4a8a;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    min-height: 44px;
    transition: background 0.3s;
  }
  button:hover { background: #1a3557; }
  .error {
    color: #dc2626;
    font-size: 13px;
    margin-bottom: 16px;
    padding: 12px;
    background: #fee2e2;
    border-radius: 4px;
    border-left: 3px solid #dc2626;
    display: none;
  }
  .footer { margin-top: 32px; font-size: 11px; color: #9ca3af; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔐 LiftWatch</div>
  <div class="subtitle">Competitive Intelligence Portal</div>
  
  <div class="error" id="err">Invalid password. Please try again.</div>
  
  <label for="pwd">Access Password</label>
  <div class="password-field">
    <input type="password" id="pwd" placeholder="Enter password" autofocus>
    <button class="password-toggle" type="button" onclick="togglePassword()">👁</button>
  </div>
  
  <button onclick="login()">Access Portal</button>
  <div class="footer">Authorised access only.</div>
</div>

<script>
const CORRECT_HASH = '4506cf8abcffb70470dc469efa2e3bcc6b24dc369f6a616f96b8f22dcbf5698a';
const KEY = 'lw_auth';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function getRedirect() {
  const params = new URLSearchParams(location.search);
  const next = params.get('next');
  if (next && next.endsWith('.html') && !next.includes('login')) return next;
  return 'index.html';
}

function togglePassword() {
  const input = document.getElementById('pwd');
  const toggle = document.querySelector('.password-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '🙈';
  } else {
    input.type = 'password';
    toggle.textContent = '👁';
  }
}

async function login() {
  const hash = await sha256(document.getElementById('pwd').value);
  if (hash === CORRECT_HASH) {
    localStorage.setItem(KEY, '1');
    window.location.href = getRedirect();
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

// Already logged in → go to destination
if (localStorage.getItem(KEY)) window.location.href = getRedirect();
</script>
</body>
</html>
