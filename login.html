<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiftWatch — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border: 1px solid #e2e5ea;
    border-radius: 12px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
  }
  .logo span { color: #2d4a8a; }
  .subtitle {
    color: #6b7280;
    font-size: 0.85rem;
    margin-bottom: 36px;
  }
  label {
    display: block;
    text-align: left;
    font-size: 0.8rem;
    font-weight: 600;
    color: #374151;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  input[type="password"]:focus { border-color: #2d4a8a; }
  button {
    width: 100%;
    padding: 14px;
    background: #2d4a8a;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #243d73; }
  .error {
    color: #dc2626;
    font-size: 0.83rem;
    margin-top: 12px;
    display: none;
  }
  .footer {
    margin-top: 32px;
    font-size: 0.75rem;
    color: #9ca3af;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lift<span>Watch</span> 🏗️</div>
  <div class="subtitle">Australian Elevator Industry Intelligence</div>

  <label for="pwd">Access Password</label>
  <input type="password" id="pwd" placeholder="Enter password" autofocus>
  <button onclick="login()">Access Portal</button>
  <div class="error" id="err">Incorrect password. Please try again.</div>

  <div class="footer">Authorised access only.</div>
</div>

<script>
// Password hash (SHA-256 of "9666")
const CORRECT_HASH = '4506cf8abcffb70470dc469efa2e3bcc6b24dc369f6a616f96b8f22dcbf5698a';
const SESSION_KEY = 'lw_auth';
const REDIRECT = 'index.html';

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function login() {
  const pwd = document.getElementById('pwd').value;
  const hash = await sha256(pwd);
  if (hash === CORRECT_HASH) {
    sessionStorage.setItem(SESSION_KEY, '1');
    window.location.href = REDIRECT;
  } else {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// Already logged in?
if (sessionStorage.getItem(SESSION_KEY)) {
  window.location.href = REDIRECT;
}
</script>
</body>
</html>
